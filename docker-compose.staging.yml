services:
  patient-db:
    image: postgres:15
    container_name: patient-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - patient-data-staging:/var/lib/postgresql/data
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-service-db:
    image: postgres:15
    container_name: auth-service-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - auth-service-data-staging:/var/lib/postgresql/data
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${AUTH_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-staging
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-staging
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  patient-service:
    image: ghcr.io/${OWNER}/patient-service:latest
    container_name: patient-service-staging
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9002
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      patient-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  billing-service:
    image: ghcr.io/${OWNER}/billing-service:latest
    container_name: billing-service-staging
    restart: unless-stopped
    ports:
      - "4002:4002"
      - "9002:9002"
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4002/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  analytics-service:
    image: ghcr.io/${OWNER}/analytics-service:latest
    container_name: analytics-service-staging
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4003/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  auth-service:
    image: ghcr.io/${OWNER}/auth-service:latest
    container_name: auth-service-staging
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-db:5432/${AUTH_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      auth-service-db:
        condition: service_healthy
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4005/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  api-gateway:
    image: ghcr.io/${OWNER}/api-gateway:latest
    container_name: api-gateway-staging
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
    depends_on:
      patient-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - microservice-net-staging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4004/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  patient-data-staging:
  auth-service-data-staging:

networks:
  microservice-net-staging:
    driver: bridge