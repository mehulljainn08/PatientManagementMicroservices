name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/patient-service:latest
          docker pull ghcr.io/${{ github.repository_owner }}/billing-service:latest
          docker pull ghcr.io/${{ github.repository_owner }}/auth-service:latest
          docker pull ghcr.io/${{ github.repository_owner }}/analytics-service:latest
          docker pull ghcr.io/${{ github.repository_owner }}/api-gateway:latest

      - name: Deploy with Docker Compose
        run: |
          docker compose down
          docker compose up -d
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_POSTGRES_DB: ${{ secrets.AUTH_POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AUTH_SERVICE_URL: ${{ secrets.AUTH_SERVICE_URL }}

      - name: Verify deployment
        run: |
          sleep 30
          docker ps